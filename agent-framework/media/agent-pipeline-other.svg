<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 615 255" style="max-width: 615px; background-color: white;">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- User node -->
  <rect x="20" y="115" width="70" height="45" rx="22" ry="22" fill="#e1f5fe" stroke="#01579b" stroke-width="2"/>
  <text x="55" y="142" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="500">User</text>
  
  <!-- Agent Middleware box -->
  <rect x="120" y="55" width="110" height="165" rx="6" ry="6" fill="#ede7f6" stroke="#5e35b1" stroke-width="2"/>
  <text x="175" y="80" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#5e35b1">Agent</text>
  <text x="175" y="95" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#5e35b1">Middleware</text>
  <text x="175" y="120" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#666">(optional)</text>
  <text x="175" y="145" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#666">.Use()</text>
  <text x="175" y="160" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#666">decorators</text>
  <text x="175" y="185" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#555" font-style="italic">Message</text>
  <text x="175" y="197" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#555" font-style="italic">AIContextProvider</text>
  
  <!-- Other Agent box (A2AAgent, etc.) -->
  <rect x="260" y="35" width="200" height="205" rx="8" ry="8" fill="#e8eaf6" stroke="#3949ab" stroke-width="2"/>
  <text x="360" y="60" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#3949ab">Other AIAgent</text>
  
  <!-- Agent types list -->
  <rect x="280" y="80" width="160" height="140" rx="5" ry="5" fill="white" stroke="#3949ab" stroke-width="1"/>
  <text x="360" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="500">Examples:</text>
  <text x="360" y="130" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#555">A2AAgent</text>
  <text x="360" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#555">GitHubCopilotAgent</text>
  <text x="360" y="170" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#555">CopilotStudioAgent</text>
  <text x="360" y="190" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#555">Custom AIAgent</text>
  <text x="360" y="210" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#555">etc.</text>
  
  <!-- Remote Service node -->
  <rect x="500" y="100" width="100" height="75" rx="8" ry="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="550" y="127" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#e65100">Remote</text>
  <text x="550" y="145" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="500" fill="#e65100">Service</text>
  <text x="550" y="165" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#666">(A2A, API, etc.)</text>
  
  <!-- External flow arrows -->
  <!-- User to Middleware -->
  <line x1="90" y1="137" x2="115" y2="137" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Middleware to Agent -->
  <line x1="230" y1="137" x2="255" y2="137" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Agent to Remote Service -->
  <line x1="460" y1="137" x2="495" y2="137" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
